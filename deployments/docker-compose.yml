version: '3.8'

services:
  mysql-prod:
    image: mysql:8.0
    container_name: production_mysql
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - backend_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:

networks:
  backend_network:
    driver: bridge