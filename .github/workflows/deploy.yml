name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Initialize OpenTofu
        working-directory: deployments/terraform/live
        run: tofu init

      - name: Deploy ECR Repository First
        working-directory: deployments/terraform/live
        run: |
          if aws ecr describe-repositories --repository-names go-app > /dev/null 2>&1; then
            echo "ECR repository go-app already exists. Importing into OpenTofu state..."
            tofu import module.ecr.aws_ecr_repository.app go-app || true
          fi
          tofu apply -target="module.ecr" -auto-approve

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Go App Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: go-app
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f deployments/dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build Lambda Function
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o deployments/terraform/live/bootstrap cmd/lambda/inbound_load/main.go
          cd deployments/terraform/live
          zip inbound_load.zip bootstrap
          rm bootstrap

      - name: Deploy Remaining Infrastructure
        working-directory: deployments/terraform/live
        run: tofu apply -auto-approve
